<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Professional Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&display=swap');

    body {
      font-family: 'Geist Mono', monospace;
      /* Starry sky background image with a darkening overlay */
      background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-color: #000;
      /* Fallback color */
      overflow: hidden;
      /* Disable scrolling */
    }

    .gradient-bg {
      /* Subtler animated Nebula effect */
      background:
        radial-gradient(ellipse at 70% 30%, rgba(29, 78, 216, 0.15) 0%, rgba(0, 0, 0, 0) 60%),
        radial-gradient(ellipse at 20% 80%, rgba(30, 58, 138, 0.15) 0%, rgba(0, 0, 0, 0) 50%),
        radial-gradient(ellipse at 50% 50%, rgba(8, 145, 178, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
      background-size: 400% 400%;
      animation: gradient 25s ease infinite;
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    ::-webkit-scrollbar-thumb {
      background: #4a4a4a;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6a6a6a;
    }

    /* Animated Gradient Text */
    .gradient-text {
      background: linear-gradient(90deg, #e0e7ff, #c7d2fe, #a5b4fc, #e0e7ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: text-shine 5s linear infinite;
    }

    @keyframes text-shine {
      to {
        background-position: 200% center;
      }
    }

    /* Typewriter effect */
    .typewriter-text {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: .15em solid #a5b4fc;
      /* Blinking cursor */
      animation:
        typing 2.5s steps(30, end) forwards,
        blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from {
        width: 0
      }

      to {
        width: 100%
      }
    }

    @keyframes blink-caret {

      from,
      to {
        border-color: transparent
      }

      50% {
        border-color: #a5b4fc;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-black text-slate-300 antialiased">
  <div id="root"></div>

</body>

</html>
